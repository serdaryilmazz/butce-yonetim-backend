<div class="app-layout">
  <header class="mobile-header">
    <button class="hamburger-btn" (click)="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <span class="headline-sm">Akıllı Cüzdan</span>
  </header>

  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-brand">
      <h2>Akıllı Cüzdan</h2>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="isSidebarOpen=false">Dashboard</a>
      <a routerLink="/transactions" routerLinkActive="active" (click)="isSidebarOpen=false">İşlemler</a>
      <a routerLink="/categories" routerLinkActive="active" (click)="isSidebarOpen=false">Bütçeler</a>
      <a routerLink="/reports" routerLinkActive="active" (click)="isSidebarOpen=false">Raporlar</a>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-toggle" (click)="toggleTheme()">
        <span class="theme-toggle-icon" aria-hidden="true">
          <svg *ngIf="!isDarkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="5"></line>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"></line>
            <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"></line>
            <line x1="2" y1="12" x2="5" y2="12"></line>
            <line x1="19" y1="12" x2="22" y2="12"></line>
            <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"></line>
            <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"></line>
          </svg>
          <svg *ngIf="isDarkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>
          </svg>
        </span>
        {{ isDarkMode ? 'Açık Mod' : 'Koyu Mod' }}
      </button>
      <button class="logout-btn" (click)="logout()">Çıkış Yap</button>
    </div>
  </aside>

  <main class="main-content" (click)="isSidebarOpen=false">
    <router-outlet></router-outlet>
  </main>
</div>
